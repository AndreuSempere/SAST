name: Semgrep SAST Scan

on:
  push:
    branches: [ main, master ]   # Triggers on push to main/master
  pull_request:
    branches: [ main, master ]   # Triggers on any PR targeting main/master

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
    - uses: actions/checkout@v4
    - name: Run Semgrep with OWASP Top 10 rules
      run: semgrep scan --config "p/owasp-top-ten" --error .
